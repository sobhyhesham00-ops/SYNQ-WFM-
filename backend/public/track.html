<!doctype html>
<html lang="ar" dir="rtl">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
<title>Track your order · El Kaptin</title>
<link rel="stylesheet" href="/vendor/maplibre-gl.css" />
<style>
  :root { --brand:#7c5cff; --grad:linear-gradient(135deg,#7c5cff,#9d7bff,#b79bff);
    --ink:#1a1730; --muted:#8b86a3; --line:#ece9f5; --ok:#17a673; --bg:#f4f2fb; }
  *{box-sizing:border-box} body{margin:0;background:var(--bg);color:var(--ink);
    font-family:system-ui,-apple-system,"Segoe UI",Roboto,"Noto Sans Arabic",sans-serif;-webkit-font-smoothing:antialiased}
  .wrap{max-width:520px;margin:0 auto;min-height:100vh;display:flex;flex-direction:column}
  header{display:flex;align-items:center;justify-content:space-between;padding:14px 18px}
  .brand{display:flex;align-items:center;gap:8px;font-weight:800;font-size:18px}
  .dot{width:26px;height:26px;border-radius:8px;background:var(--grad)}
  .ar{color:var(--muted);font-size:14px;font-weight:700}
  .lang{border:none;background:#fff;color:var(--muted);font-weight:700;border-radius:999px;padding:7px 13px;box-shadow:0 4px 14px rgba(90,70,180,.08);cursor:pointer}
  #map{height:290px;background:#e7ebf6}
  .sheet{background:#fff;margin-top:-22px;border-radius:22px 22px 0 0;padding:22px 18px 28px;
    box-shadow:0 -8px 30px rgba(90,70,180,.10);flex:1}
  .rest{color:var(--muted);font-size:13px}
  .stage{font-size:26px;font-weight:800;letter-spacing:-.5px;margin:4px 0 2px;display:flex;align-items:center;gap:10px}
  .live{width:9px;height:9px;border-radius:50%;background:var(--ok);position:relative}
  .live::after{content:"";position:absolute;inset:0;border-radius:50%;background:var(--ok);animation:p 1.8s infinite}
  @keyframes p{0%{transform:scale(1);opacity:.5}70%{transform:scale(3.5);opacity:0}100%{opacity:0}}
  .timeline{display:flex;margin:22px 0 8px}
  .step{flex:1;text-align:center;position:relative;font-size:11px;color:var(--muted);font-weight:600}
  .step .bead{width:16px;height:16px;border-radius:50%;background:var(--line);margin:0 auto 8px;border:3px solid var(--bg)}
  .step.done{color:var(--ink)} .step.done .bead{background:var(--brand)}
  .step:not(:first-child)::before{content:"";position:absolute;top:6px;inset-inline-end:50%;width:100%;height:3px;background:var(--line)}
  .step.done:not(:first-child)::before{background:var(--brand)}
  .card{border:1px solid var(--line);border-radius:14px;padding:14px;margin-top:16px;display:flex;align-items:center;gap:12px}
  .avatar{width:44px;height:44px;border-radius:12px;background:var(--grad);color:#fff;display:grid;place-items:center;font-weight:700}
  .grow{flex:1;min-width:0} .name{font-weight:700} .subtle{color:var(--muted);font-size:12px}
  .pay{margin-top:16px;background:var(--bg);border-radius:14px;padding:14px;display:flex;justify-content:space-between;align-items:center}
  .pay b{font-size:20px}
  .actions{display:flex;gap:10px;margin-top:16px}
  .btn{flex:1;text-align:center;text-decoration:none;font-weight:700;font-size:14px;padding:12px;border-radius:999px;border:1px solid var(--line);color:var(--ink);background:#fff}
  .btn.primary{background:var(--grad);color:#fff;border:none}
  .muted-note{color:var(--muted);font-size:12px;text-align:center;margin-top:18px}
  .otp-card{margin-top:16px;text-align:center;background:#f0edff;border:1px dashed var(--brand);border-radius:16px;padding:16px}
  .otp-code{font-size:34px;font-weight:800;letter-spacing:10px;color:var(--brand);font-variant-numeric:tabular-nums}
  .rate-card{margin-top:16px;text-align:center}
  .stars{font-size:34px;letter-spacing:6px;cursor:pointer;margin-top:6px}
  .stars span{opacity:.3;transition:opacity .1s}
  .stars span.on{opacity:1}
</style>
</head>
<body>
  <div class="wrap">
    <header>
      <div class="brand"><span class="dot"></span> El Kaptin <span class="ar">الكابتن</span></div>
      <button class="lang" id="lang">English</button>
    </header>
    <div id="map"></div>
    <div class="sheet">
      <div class="rest" id="rest">—</div>
      <div class="stage"><span id="stage">…</span><span class="live" id="liveDot" style="display:none"></span></div>

      <div class="timeline" id="timeline">
        <div class="step" data-i="0"><div class="bead"></div><span></span></div>
        <div class="step" data-i="1"><div class="bead"></div><span></span></div>
        <div class="step" data-i="2"><div class="bead"></div><span></span></div>
        <div class="step" data-i="3"><div class="bead"></div><span></span></div>
      </div>

      <div class="card" id="driverCard" style="display:none">
        <div class="avatar" id="dAvatar">D</div>
        <div class="grow"><div class="name" id="dName">—</div><div class="subtle" id="dSeen"></div></div>
      </div>

      <div class="pay">
        <span class="subtle" id="payLabel">—</span>
        <b id="cash">—</b>
      </div>

      <!-- Handover code: customer reads it to the driver to confirm delivery -->
      <div class="otp-card" id="otpCard" style="display:none">
        <div class="subtle" id="otpLabel"></div>
        <div class="otp-code" id="otpCode">----</div>
      </div>

      <!-- Post-delivery rating -->
      <div class="rate-card" id="rateCard" style="display:none">
        <div class="subtle" id="rateLabel"></div>
        <div class="stars" id="stars"></div>
      </div>

      <div class="actions" id="actions" style="display:none">
        <a class="btn primary" id="callBtn" href="#">📞 <span></span></a>
        <a class="btn" id="waBtn" href="#" target="_blank">🟢 WhatsApp</a>
      </div>

      <div class="muted-note" id="addr"></div>
    </div>
  </div>

<!-- Vendored (not a CDN) so the page loads even when unpkg is slow/blocked. -->
<script src="/vendor/maplibre-gl.js"></script>
<script>
  // ---- bilingual (Egyptian Arabic + English), RTL-aware ----
  const I18N = {
    ar: {
      steps: ['وصل الطلب','بيتجهّز','في الطريق','اتسلّم'],
      stages: {Pending:'وصل الطلب', Assigned:'بيتجهّز', PickedUp:'السواق في الطريق ليك', Delivered:'اتسلّم', Cancelled:'اتلغى'},
      yourDriver: 'السواق بتاعك', live:'مباشر · بيتحدّث دلوقتي',
      pay:'ادفع للسواق كاش', notFound:'الطلب مش موجود', callStore:'اتصل بالمحل', langBtn:'English',
      otpLabel:'قول الكود ده للسواق وقت الاستلام', rateLabel:'قيّم السواق', thanks:'شكراً لتقييمك 🌟',
    },
    en: {
      steps: ['Received','Preparing','On the way','Delivered'],
      stages: {Pending:'Order received', Assigned:'Preparing your order', PickedUp:'On the way', Delivered:'Delivered', Cancelled:'Cancelled'},
      yourDriver: 'your driver', live:'Live · updated just now',
      pay:'Pay the driver (cash)', notFound:'Order not found', callStore:'Call the store', langBtn:'العربية',
      otpLabel:'Give this code to the driver at handover', rateLabel:'Rate your driver', thanks:'Thanks for rating 🌟',
    },
  };
  let lang = (navigator.language||'').startsWith('ar') ? 'ar' : 'ar'; // Arabic-first
  const token = location.pathname.split('/t/')[1];
  let last = null, map, marker;

  function applyLang() {
    document.documentElement.lang = lang;
    document.documentElement.dir = lang === 'ar' ? 'rtl' : 'ltr';
    document.getElementById('lang').textContent = I18N[lang].langBtn;
    document.querySelectorAll('.step span').forEach((s,i)=> s.textContent = I18N[lang].steps[i]);
    document.getElementById('payLabel').textContent = I18N[lang].pay;
    document.querySelector('#callBtn span').textContent = I18N[lang].callStore;
    document.getElementById('otpLabel').textContent = I18N[lang].otpLabel;
    document.getElementById('rateLabel').textContent = I18N[lang].rateLabel;
    if (last) render(last);
  }
  document.getElementById('lang').onclick = () => { lang = lang==='ar'?'en':'ar'; applyLang(); };

  function initMap(lat,lng){ if(map || typeof maplibregl === 'undefined') return;
    map = new maplibregl.Map({ container:'map',
      style:{version:8,sources:{osm:{type:'raster',tiles:['https://tile.openstreetmap.org/{z}/{x}/{y}.png'],tileSize:256,attribution:'© OpenStreetMap'}},
      layers:[{id:'bg',type:'background',paint:{'background-color':'#e7ebf6'}},{id:'osm',type:'raster',source:'osm'}]}, center:[lng,lat], zoom:14 });
  }
  function setDriver(lat,lng){ initMap(lat,lng);
    if(!map) return; // map unavailable (blocked/slow) — skip, keep rest of UI
    if(!marker){ const el=document.createElement('div');
      el.style.cssText='width:20px;height:20px;border-radius:50%;background:#7c5cff;border:3px solid #fff;box-shadow:0 3px 10px rgba(0,0,0,.35)';
      marker=new maplibregl.Marker({element:el}); }
    marker.setLngLat([lng,lat]).addTo(map); map.easeTo({center:[lng,lat],duration:800});
  }

  function render(d){
    const T = I18N[lang];
    document.getElementById('rest').textContent = d.businessName;
    const idx = ['Pending','Assigned','PickedUp','Delivered'].indexOf(d.status);
    document.getElementById('stage').textContent = T.stages[d.status] || d.stage;
    document.getElementById('cash').textContent = d.cashToPayEGP + ' EGP';
    document.getElementById('addr').textContent = d.customerAddress;
    document.querySelectorAll('.step').forEach((s,i)=> s.classList.toggle('done', i<=idx && idx>=0));

    if (d.driver && d.driver.lat != null) {
      document.getElementById('driverCard').style.display='flex';
      document.getElementById('liveDot').style.display='inline-block';
      document.getElementById('dName').textContent = d.driver.name + ' · ' + T.yourDriver;
      document.getElementById('dAvatar').textContent = (d.driver.name||'D')[0];
      document.getElementById('dSeen').textContent = T.live;
      setDriver(d.driver.lat, d.driver.lng);
    }
    if (d.businessPhone) {
      document.getElementById('actions').style.display='flex';
      document.getElementById('callBtn').href = 'tel:' + d.businessPhone;
      const msg = encodeURIComponent((lang==='ar'?'بخصوص طلبي من ':'About my order from ') + d.businessName);
      document.getElementById('waBtn').href = 'https://wa.me/' + d.businessPhone.replace(/[^0-9]/g,'') + '?text=' + msg;
    }

    // Handover code while in flight.
    document.getElementById('otpCard').style.display = d.deliveryCode ? 'block' : 'none';
    if (d.deliveryCode) document.getElementById('otpCode').textContent = d.deliveryCode;

    // Rating after delivery.
    renderStars(d);
  }

  function renderStars(d) {
    const card = document.getElementById('rateCard');
    if (d.rating) { // already rated
      card.style.display = 'block';
      document.getElementById('rateLabel').textContent = I18N[lang].thanks;
      paintStars(d.rating, false);
    } else if (d.canRate) {
      card.style.display = 'block';
      document.getElementById('rateLabel').textContent = I18N[lang].rateLabel;
      paintStars(0, true);
    } else {
      card.style.display = 'none';
    }
  }
  function paintStars(value, interactive) {
    const wrap = document.getElementById('stars');
    wrap.innerHTML = '';
    for (let i = 1; i <= 5; i++) {
      const s = document.createElement('span');
      s.textContent = '⭐'; if (i <= value) s.className = 'on';
      if (interactive) s.onclick = () => submitRating(i);
      wrap.appendChild(s);
    }
  }
  async function submitRating(r) {
    paintStars(r, false);
    try {
      await fetch('/api/track/' + token + '/rate', {
        method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ rating: r }),
      });
      document.getElementById('rateLabel').textContent = I18N[lang].thanks;
    } catch (e) {}
  }

  async function poll(){
    try {
      const r = await fetch('/api/track/' + token);
      if (!r.ok) { document.getElementById('stage').textContent = I18N[lang].notFound; return; }
      last = await r.json(); render(last);
    } catch(e){ /* keep last state */ }
  }
  applyLang(); poll(); setInterval(poll, 8000);
</script>
</body>
</html>
