<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
<title>Track your order · Meshwar</title>
<link rel="stylesheet" href="https://unpkg.com/maplibre-gl@4.7.1/dist/maplibre-gl.css" />
<style>
  :root { --brand:#7c5cff; --grad:linear-gradient(135deg,#7c5cff,#9d7bff,#b79bff);
    --ink:#1a1730; --muted:#8b86a3; --line:#ece9f5; --ok:#17a673; --bg:#f4f2fb; }
  *{box-sizing:border-box} body{margin:0;background:var(--bg);color:var(--ink);
    font-family:system-ui,-apple-system,"Segoe UI",Roboto,sans-serif;-webkit-font-smoothing:antialiased}
  .wrap{max-width:520px;margin:0 auto;min-height:100vh;display:flex;flex-direction:column}
  header{display:flex;align-items:center;gap:8px;padding:16px 18px;font-weight:800;font-size:18px}
  .dot{width:26px;height:26px;border-radius:8px;background:var(--grad)}
  .ar{color:var(--muted);font-size:14px;font-weight:700}
  #map{height:300px;background:#e7ebf6}
  .sheet{background:#fff;margin-top:-22px;border-radius:22px 22px 0 0;padding:22px 18px 28px;
    box-shadow:0 -8px 30px rgba(90,70,180,.10);flex:1}
  .rest{color:var(--muted);font-size:13px}
  .stage{font-size:26px;font-weight:800;letter-spacing:-.5px;margin:4px 0 2px;display:flex;align-items:center;gap:10px}
  .live{width:9px;height:9px;border-radius:50%;background:var(--ok);position:relative}
  .live::after{content:"";position:absolute;inset:0;border-radius:50%;background:var(--ok);animation:p 1.8s infinite}
  @keyframes p{0%{transform:scale(1);opacity:.5}70%{transform:scale(3.5);opacity:0}100%{opacity:0}}
  .timeline{display:flex;gap:0;margin:22px 0 8px}
  .step{flex:1;text-align:center;position:relative;font-size:11px;color:var(--muted);font-weight:600}
  .step .bead{width:16px;height:16px;border-radius:50%;background:var(--line);margin:0 auto 8px;border:3px solid var(--bg)}
  .step.done{color:var(--ink)} .step.done .bead{background:var(--brand)}
  .step:not(:first-child)::before{content:"";position:absolute;top:6px;left:-50%;width:100%;height:3px;background:var(--line)}
  .step.done:not(:first-child)::before{background:var(--brand)}
  .card{border:1px solid var(--line);border-radius:14px;padding:14px;margin-top:16px;display:flex;align-items:center;gap:12px}
  .avatar{width:44px;height:44px;border-radius:12px;background:var(--grad);color:#fff;display:grid;place-items:center;font-weight:700}
  .grow{flex:1;min-width:0} .name{font-weight:700} .subtle{color:var(--muted);font-size:12px}
  .pay{margin-top:16px;background:var(--bg);border-radius:14px;padding:14px;display:flex;justify-content:space-between;align-items:center}
  .pay b{font-size:20px}
  .muted-note{color:var(--muted);font-size:12px;text-align:center;margin-top:18px}
</style>
</head>
<body>
  <div class="wrap">
    <header><span class="dot"></span> Meshwar <span class="ar">مشوار</span></header>
    <div id="map"></div>
    <div class="sheet">
      <div class="rest" id="rest">—</div>
      <div class="stage"><span id="stage">Loading…</span><span class="live" id="liveDot" style="display:none"></span></div>

      <div class="timeline" id="timeline">
        <div class="step" data-k="Order received"><div class="bead"></div>Received</div>
        <div class="step" data-k="Preparing your order"><div class="bead"></div>Preparing</div>
        <div class="step" data-k="On the way"><div class="bead"></div>On the way</div>
        <div class="step" data-k="Delivered"><div class="bead"></div>Delivered</div>
      </div>

      <div class="card" id="driverCard" style="display:none">
        <div class="avatar" id="dAvatar">D</div>
        <div class="grow"><div class="name" id="dName">Driver</div><div class="subtle" id="dSeen">live</div></div>
      </div>

      <div class="pay">
        <span class="subtle">Pay the driver (cash)</span>
        <b id="cash">—</b>
      </div>

      <div class="muted-note" id="addr"></div>
    </div>
  </div>

<script src="https://unpkg.com/maplibre-gl@4.7.1/dist/maplibre-gl.js"></script>
<script>
  const token = location.pathname.split('/t/')[1];
  const STAGES = ['Order received','Preparing your order','On the way','Delivered'];
  let map, marker;

  function initMap(lat, lng) {
    if (map) return;
    map = new maplibregl.Map({
      container: 'map',
      style: { version:8,
        sources:{osm:{type:'raster',tiles:['https://tile.openstreetmap.org/{z}/{x}/{y}.png'],tileSize:256,attribution:'© OpenStreetMap'}},
        layers:[{id:'bg',type:'background',paint:{'background-color':'#e7ebf6'}},{id:'osm',type:'raster',source:'osm'}] },
      center:[lng,lat], zoom:14,
    });
  }
  function setDriver(lat, lng) {
    initMap(lat, lng);
    if (!marker) {
      const el = document.createElement('div');
      el.style.cssText='width:20px;height:20px;border-radius:50%;background:#7c5cff;border:3px solid #fff;box-shadow:0 3px 10px rgba(0,0,0,.35)';
      marker = new maplibregl.Marker({element:el});
    }
    marker.setLngLat([lng,lat]).addTo(map);
    map.easeTo({center:[lng,lat], duration:800});
  }

  async function poll() {
    try {
      const r = await fetch('/api/track/' + token);
      if (!r.ok) { document.getElementById('stage').textContent = 'Order not found'; return; }
      const d = await r.json();
      document.getElementById('rest').textContent = d.restaurantName;
      document.getElementById('stage').textContent = d.stage;
      document.getElementById('cash').textContent = d.cashToPayEGP + ' EGP';
      document.getElementById('addr').textContent = d.customerAddress;

      const idx = STAGES.indexOf(d.stage);
      document.querySelectorAll('.step').forEach((s) => {
        s.classList.toggle('done', STAGES.indexOf(s.dataset.k) <= idx && idx >= 0);
      });

      if (d.driver && d.driver.lat != null) {
        document.getElementById('driverCard').style.display = 'flex';
        document.getElementById('liveDot').style.display = 'inline-block';
        document.getElementById('dName').textContent = d.driver.name + ' · your driver';
        document.getElementById('dAvatar').textContent = (d.driver.name||'D')[0];
        document.getElementById('dSeen').textContent = 'Live · updated just now';
        setDriver(d.driver.lat, d.driver.lng);
      }
    } catch (e) { /* keep last state on transient errors */ }
  }
  poll();
  setInterval(poll, 8000);
</script>
</body>
</html>
