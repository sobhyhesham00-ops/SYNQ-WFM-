# One-command local/staging stack: Postgres + backend.
#   docker compose up --build
#   docker compose exec backend npx tsx src/db/seed.ts   # seed demo data
services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: tayar
      POSTGRES_PASSWORD: tayar
      POSTGRES_DB: tayar
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U tayar"]
      interval: 5s
      timeout: 3s
      retries: 10

  backend:
    build: ./backend
    depends_on:
      db:
        condition: service_healthy
    environment:
      DATABASE_URL: "postgresql://tayar:tayar@db:5432/tayar?schema=public"
      JWT_SECRET: "change-me-in-prod"
      PORT: "8080"
    ports:
      - "8080:8080"

volumes:
  pgdata:
