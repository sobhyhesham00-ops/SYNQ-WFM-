# Builds the El Kaptin driver APK in the cloud — no local Flutter needed.
#
# Run it: GitHub → Actions → "Build driver APK" → Run workflow, and type your
# backend URL (https://…). When it finishes, open the run and download the
# "el-kaptin-driver-apk" artifact — that .apk installs straight onto an Android
# phone (Settings → allow "install unknown apps", then tap the file).
#
# The release APK is debug-signed (Flutter's default), which is fine to
# sideload for a pilot. Wire a real keystore before a Play Store upload.
name: Build driver APK

on:
  # Manual builds: pick your backend URL and download the APK artifact.
  workflow_dispatch:
    inputs:
      api_base:
        description: "Backend base URL, e.g. https://elkaptin-backend.onrender.com"
        required: true
        default: "https://api.meshwar.app"
      ws_base:
        description: "WebSocket base URL, e.g. wss://elkaptin-backend.onrender.com"
        required: true
        default: "wss://api.meshwar.app"
  # Also rebuild automatically whenever the driver app changes, so there's always
  # a fresh, known-good APK to grab. Uses the default URLs (override via a manual
  # run, or set repo Variables API_BASE / WS_BASE).
  push:
    paths:
      - "mobile/flutter/**"
      - ".github/workflows/build-apk.yml"

jobs:
  build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: mobile/flutter
    steps:
      - uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Prepare Android project (scaffold + permissions + icons)
        run: bash tool/prepare_android.sh

      - name: Build release APK
        env:
          API_BASE: ${{ inputs.api_base || vars.API_BASE || 'https://api.meshwar.app' }}
          WS_BASE: ${{ inputs.ws_base || vars.WS_BASE || 'wss://api.meshwar.app' }}
        run: |
          flutter build apk --release \
            --dart-define=API_BASE="$API_BASE" \
            --dart-define=WS_BASE="$WS_BASE"

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: el-kaptin-driver-apk
          path: mobile/flutter/build/app/outputs/flutter-apk/app-release.apk
          if-no-files-found: error
