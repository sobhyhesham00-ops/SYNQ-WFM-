<svg width="512" height="512" viewBox="0 0 512 512" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Meshwar app icon">
  <defs>
    <linearGradient id="mg" x1="0" y1="0" x2="512" y2="512" gradientUnits="userSpaceOnUse">
      <stop stop-color="#7C5CFF"/>
      <stop offset="0.55" stop-color="#9D7BFF"/>
      <stop offset="1" stop-color="#B79BFF"/>
    </linearGradient>
    <filter id="ds" x="-30%" y="-30%" width="160%" height="160%">
      <feDropShadow dx="0" dy="9" stdDeviation="12" flood-color="#3A2A82" flood-opacity="0.30"/>
    </filter>
  </defs>

  <!-- rounded-square ground -->
  <rect width="512" height="512" rx="120" fill="url(#mg)"/>
  <ellipse cx="150" cy="70" rx="230" ry="120" fill="#ffffff" opacity="0.06"/>

  <!-- the meshwar: a route from origin to destination -->
  <path d="M150 372 C 150 300, 250 320, 256 256 C 262 192, 210 176, 256 128"
        stroke="#FFFFFF" stroke-width="24" stroke-linecap="round" fill="none"
        stroke-dasharray="0.1 42" opacity="0.9"/>

  <!-- origin dot -->
  <circle cx="150" cy="372" r="30" fill="#FFFFFF" filter="url(#ds)"/>
  <circle cx="150" cy="372" r="12" fill="#7C5CFF"/>

  <!-- destination pin (rounded head) -->
  <g filter="url(#ds)">
    <path d="M356 262 C 320 214, 288 196, 288 150 A 68 68 0 1 1 424 150 C 424 196, 392 214, 356 262 Z" fill="#FFFFFF"/>
    <circle cx="356" cy="150" r="28" fill="#7C5CFF"/>
  </g>
</svg>
