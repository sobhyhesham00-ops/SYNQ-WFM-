<svg width="512" height="512" viewBox="0 0 512 512" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Meshwar app icon">
  <defs>
    <linearGradient id="mg" x1="0" y1="0" x2="512" y2="512" gradientUnits="userSpaceOnUse">
      <stop stop-color="#7C5CFF"/>
      <stop offset="0.55" stop-color="#9D7BFF"/>
      <stop offset="1" stop-color="#B79BFF"/>
    </linearGradient>
    <filter id="ds" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="10" stdDeviation="14" flood-color="#3A2A82" flood-opacity="0.35"/>
    </filter>
  </defs>

  <!-- rounded-square ground -->
  <rect x="0" y="0" width="512" height="512" rx="120" fill="url(#mg)"/>

  <!-- the meshwar: a winding route from origin to destination -->
  <path d="M150 372 C 150 300, 250 320, 256 256 C 262 192, 210 176, 256 132"
        stroke="#FFFFFF" stroke-width="26" stroke-linecap="round" fill="none"
        stroke-dasharray="4 44" opacity="0.95"/>

  <!-- origin dot -->
  <circle cx="150" cy="372" r="30" fill="#FFFFFF" filter="url(#ds)"/>
  <circle cx="150" cy="372" r="13" fill="#7C5CFF"/>

  <!-- destination pin -->
  <g filter="url(#ds)">
    <path d="M356 96 C 312 96, 292 130, 292 162 C 292 205, 356 250, 356 250 C 356 250, 420 205, 420 162 C 420 130, 400 96, 356 96 Z" fill="#FFFFFF"/>
    <circle cx="356" cy="160" r="26" fill="#7C5CFF"/>
  </g>
</svg>
