# Meshwar — Render Blueprint (one-click deploy of the whole stack).
# In Render: New → Blueprint → point at this repo. Creates Postgres + backend
# (REST/WebSocket) + the dashboard static site.
databases:
  - name: meshwar-db
    databaseName: meshwar
    user: meshwar
    plan: free

services:
  # Backend: REST API + WebSocket tracking.
  - type: web
    name: meshwar-backend
    runtime: node
    plan: free
    rootDir: backend
    buildCommand: npm install && npx prisma generate
    startCommand: npx prisma db push --skip-generate && npx tsx src/server.ts
    healthCheckPath: /health
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: meshwar-db
          property: connectionString
      - key: JWT_SECRET
        generateValue: true
      - key: PORT
        value: "8080"

  # Manager dashboard (static SPA). Fill the two URLs with your backend's host
  # when applying the blueprint (Render will prompt because sync is false).
  - type: web
    name: meshwar-dashboard
    runtime: static
    rootDir: dashboard
    buildCommand: npm install && npm run build
    staticPublishPath: dist
    envVars:
      - key: VITE_API_BASE
        sync: false   # e.g. https://meshwar-backend.onrender.com
      - key: VITE_WS_BASE
        sync: false   # e.g. wss://meshwar-backend.onrender.com
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
